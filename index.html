<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#c5654a">
    <meta name="description" content="Le Yam maison de Leslie, seule ou contre l’ordinateur.">
    <title>Le Yam de Leslie</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <section class="welcome-screen" id="welcome-screen" aria-labelledby="welcome-title">
      <div class="welcome-card">
        <p class="welcome-eyebrow">Le Yam de Leslie</p>
        <h1 id="welcome-title">À vous de jouer</h1>
        <p>Choisissez votre façon de remplir la feuille aujourd’hui.</p>
        <div class="mode-actions">
          <button class="mode-button primary-mode" id="start-single" type="button">
            <strong>Jouer seule</strong>
            <span>Une feuille, à votre rythme</span>
          </button>
          <button class="mode-button" id="start-computer" type="button">
            <strong>Contre l’ordinateur</strong>
            <span>Un adversaire cohérent et battable</span>
          </button>
        </div>
      </div>
    </section>

    <main class="app-shell" id="app" hidden>
      <header class="game-header">
        <div class="turn-summary">
          <span class="eyebrow">Au tour de</span>
          <strong id="turn-name">Leslie</strong>
        </div>
        <div class="score-summary" aria-label="Totaux de la partie">
          <span><b id="human-total">0</b><small>Leslie</small></span>
          <span id="score-separator" aria-hidden="true"><i>—</i></span>
          <span id="computer-score"><b id="computer-total">0</b><small>Ordi</small></span>
        </div>
        <button class="text-button" id="new-game" type="button">Nouvelle partie</button>
      </header>

      <section class="sheet-panel" aria-labelledby="sheet-title">
        <div class="sheet-tabs" id="sheet-tabs" role="tablist" aria-label="Feuille consultée">
          <button class="sheet-tab active" id="human-sheet-tab" type="button" role="tab" aria-selected="true" data-player-index="0">Leslie</button>
          <button class="sheet-tab" id="computer-sheet-tab" type="button" role="tab" aria-selected="false" data-player-index="1">L’ordinateur</button>
        </div>
        <div class="sheet-heading">
          <span id="sheet-title">Feuille de Leslie</span>
          <span class="announcement-banner" id="announcement-banner" aria-live="polite"></span>
          <span id="turn-progress">0 / 65</span>
        </div>
        <div class="score-grid" id="score-grid"></div>
      </section>

      <section class="turn-panel" aria-label="Zone de lancer">
        <p class="turn-message" id="turn-message" aria-live="polite">Lancez les cinq dés pour commencer.</p>
        <div class="dice-row" id="dice-row"></div>
        <button class="primary-button" id="roll-button" type="button">Lancer les dés</button>
      </section>
    </main>
    <div id="overlay-root"></div>
    <script type="module" src="./src/ui/app.js"></script>
  </body>
</html>
